<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sudoku</title>
<style>
  #tabuleiro {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    grid-template-rows: repeat(9, 50px);
    gap: 2px;
  }
  .celula {
    width: 50px;
    height: 50px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
  }
  .fixa {
    background-color: #ddd;
  }
  .correta {
    background-color: #c8e6c9; /* verde */
  }
  .errada {
    background-color: #ffcdd2; /* vermelho */
  }
  #mensagem {
    margin-top: 10px;
    font-size: 20px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h2>Sudoku Aleatório</h2>
<div id="tabuleiro"></div>
<div id="mensagem"></div>
<button id="reiniciar">Reiniciar Jogo</button>

<script src="script.js"></script>
</body>
</html>
